spring.application.name=backend

# Server port
server.port=8080

# Gemini API configuration
# The ${} syntax tells Spring: read this value from 
# an environment variable, don't hardcode it
gemini.api.key=${GEMINI_API_KEY}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent

# CORS - allows our frontend to talk to our backend
# We'll explain this properly when we build the frontend
cors.allowed.origins=http://localhost:5500,http://127.0.0.1:5500,http://localhost:3000