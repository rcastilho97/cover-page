<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mockup A — Floating Download Button</title>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Roboto', Arial, sans-serif;
      font-size: 14px;
      color: #202124;
      background: #f8f9fa;
    }

    /* Simple nav bar */
    .nav {
      display: flex;
      align-items: center;
      padding: 12px 24px;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
    }
    .logo-small {
      font-family: 'Google Sans', sans-serif;
      font-size: 22px;
      font-weight: 500;
      cursor: pointer;
      user-select: none;
    }
    .logo-small span:nth-child(1) { color: #4285f4; }
    .logo-small span:nth-child(2) { color: #ea4335; }
    .logo-small span:nth-child(3) { color: #fbbc05; }
    .logo-small span:nth-child(4) { color: #4285f4; }
    .logo-small span:nth-child(5) { color: #34a853; }
    .logo-small span:nth-child(6) { color: #ea4335; }

    /* Section header */
    .cv-header {
      max-width: 820px;
      margin: 32px auto 0;
      padding: 0 24px;
    }
    .section-header-top {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 8px;
    }
    .section-header-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      background: #fce8e6;
    }
    .section-header-icon svg {
      width: 20px;
      height: 20px;
      fill: #ea4335;
    }
    .section-header-top h1 {
      font-size: 28px;
      font-weight: 400;
      color: #202124;
    }
    .section-meta {
      font-size: 13px;
      color: #70757a;
      margin-bottom: 4px;
    }
    .section-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }
    .tag {
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 16px;
      background: #f1f3f4;
      color: #5f6368;
    }
    .tag.highlight {
      background: #e8f0fe;
      color: #1a73e8;
    }

    /* CV container */
    .cv-container {
      position: relative;
      max-width: 820px;
      margin: 24px auto;
      padding: 0 24px;
    }

    .cv-embed-wrap {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    .cv-embed-wrap iframe {
      width: 100%;
      height: 80vh;
      border: none;
      display: block;
    }

    /* Floating download button */
    .cv-download-float {
      position: fixed;
      right: max(24px, calc((100vw - 820px) / 2 - 80px));
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      z-index: 10;
    }

    .cv-download-float a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #1a73e8;
      box-shadow: 0 2px 8px rgba(26,115,232,0.4);
      transition: background 0.2s, box-shadow 0.2s, transform 0.15s;
      text-decoration: none;
    }

    .cv-download-float a:hover {
      background: #1557b0;
      box-shadow: 0 4px 12px rgba(26,115,232,0.5);
      transform: translateY(-50%) scale(1.05);
    }

    .cv-download-float a:hover {
      transform: scale(1.05);
    }

    .cv-download-float svg {
      width: 24px;
      height: 24px;
      fill: #fff;
    }

    .cv-download-float .download-label {
      font-size: 11px;
      color: #5f6368;
      font-weight: 500;
      white-space: nowrap;
    }

    /* Hide float on small screens */
    @media (max-width: 1024px) {
      .cv-download-float {
        position: fixed;
        right: 20px;
        bottom: 24px;
        top: auto;
        transform: none;
      }
      .cv-download-float .download-label {
        display: none;
      }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="logo-small">
      <span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span>
    </div>
  </nav>

  <div class="cv-header">
    <div class="section-header-top">
      <div class="section-header-icon">
        <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm-1 7V3.5L18.5 9H13zM6 20V4h5v7h7v9H6z"/></svg>
      </div>
      <h1>Curriculum Vitae</h1>
    </div>
    <p class="section-meta">coverpage.rebeca.dev > cv</p>
    <div class="section-tags">
      <span class="tag highlight">Software Engineering</span>
      <span class="tag highlight">Google Apprenticeship</span>
      <span class="tag">Dublin, Ireland</span>
    </div>
  </div>

  <div class="cv-container">
    <div class="cv-embed-wrap">
      <iframe src="Rebeca Castilho - CV - Google Software Development Apprenticeship.pdf"></iframe>
    </div>
  </div>

  <!-- Floating download button on the side -->
  <div class="cv-download-float">
    <a href="Rebeca Castilho - CV - Google Software Development Apprenticeship.pdf" download title="Download CV as PDF">
      <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
    </a>
    <span class="download-label">Download PDF</span>
  </div>

</body>
</html>
