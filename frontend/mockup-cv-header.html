<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mockup B — Header Download Button</title>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Roboto', Arial, sans-serif;
      font-size: 14px;
      color: #202124;
      background: #f8f9fa;
    }

    /* Simple nav bar */
    .nav {
      display: flex;
      align-items: center;
      padding: 12px 24px;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
    }
    .logo-small {
      font-family: 'Google Sans', sans-serif;
      font-size: 22px;
      font-weight: 500;
      cursor: pointer;
      user-select: none;
    }
    .logo-small span:nth-child(1) { color: #4285f4; }
    .logo-small span:nth-child(2) { color: #ea4335; }
    .logo-small span:nth-child(3) { color: #fbbc05; }
    .logo-small span:nth-child(4) { color: #4285f4; }
    .logo-small span:nth-child(5) { color: #34a853; }
    .logo-small span:nth-child(6) { color: #ea4335; }

    /* Section header */
    .cv-header {
      max-width: 820px;
      margin: 32px auto 0;
      padding: 0 24px;
    }

    .section-header-top {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 8px;
    }
    .section-header-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      background: #fce8e6;
    }
    .section-header-icon svg {
      width: 20px;
      height: 20px;
      fill: #ea4335;
    }

    .header-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex: 1;
      min-width: 0;
    }

    .header-title-row h1 {
      font-size: 28px;
      font-weight: 400;
      color: #202124;
    }

    /* Download button in header */
    .cv-download-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 24px;
      background: #1a73e8;
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      font-family: 'Google Sans', 'Roboto', sans-serif;
      text-decoration: none;
      transition: background 0.2s, box-shadow 0.2s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .cv-download-btn:hover {
      background: #1557b0;
      box-shadow: 0 2px 8px rgba(26,115,232,0.3);
    }

    .cv-download-btn svg {
      width: 18px;
      height: 18px;
      fill: #fff;
    }

    .section-meta {
      font-size: 13px;
      color: #70757a;
      margin-bottom: 4px;
    }
    .section-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }
    .tag {
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 16px;
      background: #f1f3f4;
      color: #5f6368;
    }
    .tag.highlight {
      background: #e8f0fe;
      color: #1a73e8;
    }

    /* CV container */
    .cv-container {
      max-width: 820px;
      margin: 24px auto;
      padding: 0 24px;
    }

    .cv-embed-wrap {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    .cv-embed-wrap iframe {
      width: 100%;
      height: 80vh;
      border: none;
      display: block;
    }

    /* Mobile */
    @media (max-width: 768px) {
      .section-header-top {
        flex-wrap: wrap;
      }
      .header-title-row {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }
      .header-title-row h1 {
        font-size: 22px;
      }
      .cv-download-btn {
        align-self: flex-start;
      }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="logo-small">
      <span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span>
    </div>
  </nav>

  <div class="cv-header">
    <div class="section-header-top">
      <div class="section-header-icon">
        <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm-1 7V3.5L18.5 9H13zM6 20V4h5v7h7v9H6z"/></svg>
      </div>
      <div class="header-title-row">
        <h1>Curriculum Vitae</h1>
        <a class="cv-download-btn" href="Rebeca Castilho - CV - Google Software Development Apprenticeship.pdf" download>
          <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
          Download PDF
        </a>
      </div>
    </div>
    <p class="section-meta">coverpage.rebeca.dev > cv</p>
    <div class="section-tags">
      <span class="tag highlight">Software Engineering</span>
      <span class="tag highlight">Google Apprenticeship</span>
      <span class="tag">Dublin, Ireland</span>
    </div>
  </div>

  <div class="cv-container">
    <div class="cv-embed-wrap">
      <iframe src="Rebeca Castilho - CV - Google Software Development Apprenticeship.pdf"></iframe>
    </div>
  </div>

</body>
</html>
