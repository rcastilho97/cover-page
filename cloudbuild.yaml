steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cover-page/cover-page-backend:$COMMIT_SHA'
      - '-f'
      - 'backend/Dockerfile'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cover-page/cover-page-backend:$COMMIT_SHA'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'cover-page-backend'
      - '--image'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cover-page/cover-page-backend:$COMMIT_SHA'
      - '--region'
      - 'europe-west1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-secrets'
      - 'GEMINI_API_KEY=GEMINI_API_KEY:latest'

images:
  - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cover-page/cover-page-backend:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
